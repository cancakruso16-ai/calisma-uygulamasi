<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çalışma Uygulaması</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #2c3e50; }
        .screen { display: none; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }
        .screen.active { display: block; }
        button, select, input {
            padding: 10px 15px; margin: 10px 5px; border-radius: 5px; font-size: 16px;
            border: 1px solid #ddd; box-sizing: border-box;
        }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-secondary { background-color: #95a5a6; }
        .btn-secondary:hover { background-color: #7f8c8d; }
        .btn-export { background-color: #27ae60; }
        .btn-export:hover { background-color: #2ecc71; }
        
        textarea {
            width: 100%; height: 90px; margin: 10px 0; padding: 10px;
            border: 1px solid #ddd; border-radius: 5px; resize: vertical; box-sizing: border-box; font-family: inherit;
        }
        input[type="text"] { width: 100%; margin-top: 10px; }
        
        .question-card, .answer-card {
            font-size: 18px; padding: 20px; margin: 20px 0; background: #ecf0f1; border-radius: 8px;
        }
        .answer-card { background: #d4efdf; display: none; }
        .badge {
            display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 12px; margin-bottom: 10px; margin-right: 5px; color: white; background: #8e44ad;
        }
        
        .delete-list { text-align: left; list-style: none; padding: 0; }
        .delete-list li {
            background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 5px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; flex-wrap: wrap; gap: 10px;
        }
        .controls { display: flex; justify-content: space-between; margin-top: 20px; }
        .status { margin-bottom: 15px; font-weight: bold; color: #7f8c8d; }
        
        .filter-group { display: flex; flex-direction: column; align-items: stretch; gap: 5px; margin-bottom: 15px; }
        .filter-group label { text-align: left; font-weight: bold; font-size: 14px; color: #555; }
        
        .backup-controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
    </style>
</head>
<body>

    <h1>Çalışma Uygulaması</h1>

    <div id="home-screen" class="screen active">
        
        <div style="float: right; color: #ff8c00; font-weight: bold; font-size: 15px; margin-top: -10px;">
            🧡 Seni çok seviyorum 🧡
        </div>

        <p>Ne yapmak istersin?</p>
        
        <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
            <div class="filter-group">
                <label for="lesson-select">Ders Seçimi:</label>
                <select id="lesson-select">
                    <option value="all">Tüm Dersler</option>
                </select>
            </div>
            <button onclick="startTest()" style="width: 100%;">Soru Çöz</button>
        </div>

        <button onclick="showScreen('add-screen')">Soru Ekle</button>
        <button onclick="showDeleteScreen()">Soru Sil</button>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <div class="backup-controls">
            <button class="btn-export" onclick="exportQuestions()">Yedekle (Dışa Aktar)</button>
            <button class="btn-secondary" onclick="document.getElementById('file-upload').click()">Yedeği Yükle (İçe Aktar)</button>
            <input type="file" id="file-upload" accept=".json" style="display:none;" onchange="importQuestions(event)">
        </div>

        <div style="text-align: left; color: #ff8c00; font-style: italic; font-size: 14px; margin-top: 15px;">
            Her zaman yanındayım
        </div>
        
    </div>

    <div id="add-screen" class="screen">
        <h2>Yeni Soru Ekle</h2>
        <input type="text" id="new-lesson" placeholder="Ders (Örn: Veritabanı Sistemleri, Tarih vs.)">
        <textarea id="new-question" placeholder="Soruyu buraya yaz..."></textarea>
        <textarea id="new-answer" placeholder="Cevabı buraya yaz..."></textarea>
        <br>
        <button onclick="addQuestion()">Kaydet</button>
        <button class="btn-secondary" onclick="showScreen('home-screen')">Ana Sayfaya Dön</button>
    </div>

    <div id="solve-screen" class="screen">
        <h2>Soru Çözümü</h2>
        <div class="status" id="test-status">Soru: 0 / 0</div>
        
        <div class="question-card">
            <div><span class="badge" id="display-lesson">Ders</span></div>
            <div id="display-question" style="margin-top: 10px;">Soru metni burada görünecek.</div>
        </div>
        
        <button id="btn-show-answer" onclick="showAnswer()">Cevabı Görüntüle</button>
        <div class="answer-card" id="display-answer">Cevap metni burada görünecek.</div>
        
        <div class="controls">
            <button class="btn-secondary" id="btn-prev" onclick="prevQuestion()">Önceki</button>
            <button class="btn-secondary" onclick="showScreen('home-screen')">Bitir</button>
            <button id="btn-next" onclick="nextQuestion()">Sonraki</button>
        </div>
    </div>

    <div id="delete-screen" class="screen">
        <h2>Soru Sil</h2>
        <ul class="delete-list" id="questions-list">
            </ul>
        <button class="btn-secondary" onclick="showScreen('home-screen')">Ana Sayfaya Dön</button>
    </div>

    <script>
        // Ana Veriyi Çek
        let questions = JSON.parse(localStorage.getItem('calismaSorulari')) || [];
        
        // Eğer eski verilerde konu (topic) özelliği varsa, onu yoksayarak veriyi temizliyoruz
        questions = questions.map(q => ({
            id: q.id,
            lesson: q.lesson || q.c || 'Genel Ders',
            q: q.q,
            a: q.a
        }));
        
        let testQueue = [];
        let currentIndex = 0;

        updateLessonSelect();

        function saveQuestions() {
            localStorage.setItem('calismaSorulari', JSON.stringify(questions));
            updateLessonSelect(); 
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(screenId === 'delete-screen') showDeleteScreen();
        }

        function updateLessonSelect() {
            const select = document.getElementById('lesson-select');
            const currentSelection = select.value;
            select.innerHTML = '<option value="all">Tüm Dersler</option>';
            
            const lessons = [...new Set(questions.map(q => q.lesson))].filter(l => l);
            lessons.forEach(lesson => {
                const option = document.createElement('option');
                option.value = lesson;
                option.innerText = lesson;
                select.appendChild(option);
            });
            
            if (lessons.includes(currentSelection)) select.value = currentSelection;
        }

        function addQuestion() {
            const lInput = document.getElementById('new-lesson');
            const qInput = document.getElementById('new-question');
            const aInput = document.getElementById('new-answer');
            
            if(qInput.value.trim() === '' || aInput.value.trim() === '') {
                alert('Lütfen soru ve cevap alanını doldur.');
                return;
            }

            questions.push({
                id: Date.now(),
                lesson: lInput.value.trim() || 'Genel Ders',
                q: qInput.value.trim(),
                a: aInput.value.trim()
            });

            saveQuestions();
            alert('Soru başarıyla eklendi!');
            qInput.value = '';
            aInput.value = '';
        }

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startTest() {
            if (questions.length === 0) {
                alert('Testi başlatmak için önce soru eklemelisin!');
                return;
            }

            const selectedLesson = document.getElementById('lesson-select').value;
            let filteredQuestions = questions;
            
            if (selectedLesson !== 'all') {
                filteredQuestions = filteredQuestions.filter(q => q.lesson === selectedLesson);
            }

            if (filteredQuestions.length === 0) {
                alert('Seçtiğin derse uygun soru bulunamadı!');
                return;
            }

            testQueue = shuffleArray(filteredQuestions);
            currentIndex = 0;
            renderTest();
            showScreen('solve-screen');
        }

        function renderTest() {
            const currentQ = testQueue[currentIndex];
            document.getElementById('display-lesson').innerText = currentQ.lesson || 'Ders';
            document.getElementById('display-question').innerText = currentQ.q;
            document.getElementById('display-answer').innerText = currentQ.a;
            
            document.getElementById('display-answer').style.display = 'none';
            document.getElementById('btn-show-answer').style.display = 'inline-block';
            document.getElementById('test-status').innerText = `Soru: ${currentIndex + 1} / ${testQueue.length}`;
            
            document.getElementById('btn-prev').disabled = (currentIndex === 0);
            document.getElementById('btn-prev').style.opacity = (currentIndex === 0) ? '0.5' : '1';
            
            if (currentIndex === testQueue.length - 1) {
                document.getElementById('btn-next').innerText = "Başa Dön";
            } else {
                document.getElementById('btn-next').innerText = "Sonraki";
            }
        }

        function showAnswer() {
            document.getElementById('display-answer').style.display = 'block';
            document.getElementById('btn-show-answer').style.display = 'none';
        }

        function nextQuestion() {
            if (currentIndex < testQueue.length - 1) {
                currentIndex++;
                renderTest();
            } else {
                alert('Test bitti! Sorular yeniden karıştırılıp başlatılıyor...');
                startTest();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderTest();
            }
        }

        function showDeleteScreen() {
            const listElement = document.getElementById('questions-list');
            listElement.innerHTML = '';

            if(questions.length === 0) {
                listElement.innerHTML = '<p>Henüz eklenmiş soru yok.</p>';
            } else {
                let reversedQuestions = [...questions].reverse();
                reversedQuestions.forEach(item => {
                    const li = document.createElement('li');
                    const shortQ = item.q.length > 35 ? item.q.substring(0, 35) + '...' : item.q;
                    li.innerHTML = `
                        <div style="flex-grow: 1; display:flex; flex-direction:column; gap:5px;">
                            <div><span class="badge" style="font-size: 10px;">${item.lesson}</span></div>
                            <span>${shortQ}</span>
                        </div>
                        <button class="btn-danger" style="padding: 5px 10px; font-size: 14px;" onclick="deleteQuestion(${item.id})">Sil</button>
                    `;
                    listElement.appendChild(li);
                });
            }
        }

        function deleteQuestion(id) {
            if(confirm('Bu soruyu silmek istediğine emin misin?')) {
                // Number(id) kullanarak eşleşme hatasını giderdik
                questions = questions.filter(q => q.id !== Number(id));
                saveQuestions();
                showDeleteScreen(); 
            }
        }

        function exportQuestions() {
            if(questions.length === 0) {
                alert('Dışa aktarılacak soru yok!');
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(questions));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "calisma_sorulari_yedek.json");
            document.body.appendChild(downloadAnchorNode); 
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // YENİ: İçe Aktarma Fonksiyonu
        function importQuestions(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        // Yeni gelen soruları mevcut sorulara ekle, çakışmayı önlemek için ID'leri yenile
                        const newData = importedData.map(q => ({
                            id: Date.now() + Math.floor(Math.random() * 10000), 
                            lesson: q.lesson || q.c || 'Genel Ders',
                            q: q.q,
                            a: q.a
                        }));
                        
                        questions = questions.concat(newData);
                        saveQuestions();
                        alert('Sorular başarıyla yüklendi!');
                    } else {
                        alert('Geçersiz dosya formatı. Lütfen doğru yedeği seçtiğinden emin ol.');
                    }
                } catch (error) {
                    alert('Dosya okunurken bir hata oluştu.');
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Aynı dosyayı tekrar seçebilmek için inputu temizle
        }

        // PWA Service Worker Kaydı
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker başarıyla kaydedildi.', reg))
                    .catch(err => console.log('Service Worker hatası:', err));
            });
        }
    </script>
</body>
</html>
